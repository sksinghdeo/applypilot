name: Bug report
description: Report reproducible ApplyPilot behavior using fictional or sanitized data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include API keys, real resumes, addresses, immigration details, or account credentials.
  - type: input
    id: version
    attributes:
      label: ApplyPilot version
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use fictional or sanitized data only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser, OS, and Node version
