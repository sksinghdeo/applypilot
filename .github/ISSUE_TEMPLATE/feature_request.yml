name: Feature request
description: Propose a privacy-preserving improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Privacy and human-control considerations
      description: Explain how the feature avoids blind submission, fabricated facts, and sensitive-field automation.
    validations:
      required: true
